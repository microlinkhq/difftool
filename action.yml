name: microlink-difftool
description: Visual diff between two URLs using Microlink full-page screenshots, posted as a sticky PR comment.
author: Microlink HQ
branding:
  icon: image
  color: purple

inputs:
  base:
    description: Production / baseline URL
    required: true
  head:
    description: Preview URL to compare against base
    required: true
  pr-number:
    description: Pull request number to comment on
    required: true
  sha:
    description: Commit SHA used in the assets path (typically the PR head SHA)
    required: true
  routes:
    description: Comma-separated paths to diff (e.g. "/,/kikobeats")
    default: '/'
  threshold:
    description: Max acceptable diff ratio (0..1) before the action fails
    default: '0.001'
  pixel-threshold:
    description: Per-pixel sensitivity (0..1)
    default: '0.1'
  viewport-width:
    default: '1280'
  viewport-height:
    default: '800'
  microlink-api-key:
    description: Optional Microlink paid-tier key (recommended for CI)
    required: false
  release-tag-prefix:
    description: Prefix for the per-PR release tag (final tag is "<prefix>-<pr-number>")
    default: microlink-difftool-pr
  comment-marker:
    description: HTML comment marker so re-runs edit the same PR comment
    default: '<!-- microlink-difftool -->'
  github-token:
    description: Token used to push assets and comment on the PR
    default: ${{ github.token }}

outputs:
  passed:
    description: '"true" if all routes are within threshold, else "false"'
    value: ${{ steps.diff.outputs.passed }}
  summary-json:
    description: Path to summary.json on the runner
    value: ${{ steps.diff.outputs.summary-json }}

runs:
  using: composite
  steps:
    - name: Install canvas native dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install CLI dependencies
      shell: bash
      run: |
        corepack enable
        cd "${{ github.action_path }}"
        pnpm install --no-frozen-lockfile

    - name: Run microlink-difftool
      id: diff
      shell: bash
      env:
        MICROLINK_API_KEY: ${{ inputs.microlink-api-key }}
        OUT_DIR: ${{ runner.temp }}/microlink-difftool
      run: |
        set +e
        node "${{ github.action_path }}/bin/cli.js" \
          --base "${{ inputs.base }}" \
          --head "${{ inputs.head }}" \
          --routes "${{ inputs.routes }}" \
          --threshold "${{ inputs.threshold }}" \
          --pixel-threshold "${{ inputs.pixel-threshold }}" \
          --viewport-width "${{ inputs.viewport-width }}" \
          --viewport-height "${{ inputs.viewport-height }}" \
          --out "$OUT_DIR"
        DIFF_EXIT=$?
        set -e

        if [ "$DIFF_EXIT" -eq 2 ]; then
          echo "::error::microlink-difftool failed to run (exit 2)"
          exit 2
        fi

        if [ "$DIFF_EXIT" -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        echo "summary-json=$OUT_DIR/summary.json" >> "$GITHUB_OUTPUT"
        echo "diff-exit=$DIFF_EXIT" >> "$GITHUB_OUTPUT"

    - name: Upload screenshots to GitHub Release
      id: upload-assets
      uses: actions/github-script@v7
      env:
        SUMMARY_PATH: ${{ steps.diff.outputs.summary-json }}
        OUT_DIR: ${{ runner.temp }}/microlink-difftool
        PR_NUMBER: ${{ inputs.pr-number }}
        PR_SHA: ${{ inputs.sha }}
        TAG_PREFIX: ${{ inputs.release-tag-prefix }}
        URLS_PATH: ${{ runner.temp }}/microlink-difftool-urls.json
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs')
          const path = require('path')
          const { owner, repo } = context.repo
          const prNumber = Number(process.env.PR_NUMBER)
          const sha = process.env.PR_SHA
          const tagPrefix = process.env.TAG_PREFIX
          const tag = `${tagPrefix}-${prNumber}`
          const outDir = process.env.OUT_DIR
          const summary = JSON.parse(fs.readFileSync(process.env.SUMMARY_PATH, 'utf8'))

          // Resolve or create the per-PR release.
          let release
          try {
            const got = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
            release = got.data
            core.info(`reusing existing release ${tag} (id=${release.id})`)
          } catch (err) {
            if (err.status !== 404) throw err
            const created = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: sha,
              name: `microlink-difftool: PR #${prNumber}`,
              body: `Visual diff screenshots for #${prNumber}.`,
              prerelease: true,
              draft: false
            })
            release = created.data
            core.info(`created release ${tag} (id=${release.id})`)
          }

          const FILES = ['base.png', 'head.png', 'diff.png', 'review.png']
          const urls = {}

          for (const route of summary.routes) {
            const slug = route.outDir && route.outDir !== '.' ? route.outDir : 'root'
            const routeDir = !route.outDir || route.outDir === '.' ? outDir : path.join(outDir, route.outDir)

            for (const basename of FILES) {
              const localPath = path.join(routeDir, basename)
              if (!fs.existsSync(localPath)) {
                core.warning(`missing local file ${localPath}; skipping`)
                continue
              }
              const assetName = `${slug}-${basename}`

              // Delete any prior asset with the same name so the new upload doesn't collide.
              const { data: existing } = await github.rest.repos.listReleaseAssets({
                owner, repo, release_id: release.id, per_page: 100
              })
              const dup = existing.find(a => a.name === assetName)
              if (dup) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: dup.id })
                core.info(`deleted previous asset ${assetName} (id=${dup.id})`)
              }

              const data = fs.readFileSync(localPath)
              const uploaded = await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: assetName,
                data
              })
              urls[`${slug}/${basename}`] = uploaded.data.browser_download_url
              core.info(`uploaded ${assetName} → ${uploaded.data.browser_download_url}`)
            }
          }

          fs.writeFileSync(process.env.URLS_PATH, JSON.stringify(urls, null, 2))
          core.setOutput('urls-path', process.env.URLS_PATH)

    - name: Render comment markdown
      id: render
      shell: bash
      env:
        SUMMARY: ${{ steps.diff.outputs.summary-json }}
        URLS_PATH: ${{ steps.upload-assets.outputs.urls-path }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        MARKER: ${{ inputs.comment-marker }}
        BODY_PATH: ${{ runner.temp }}/microlink-difftool-comment.md
      run: |
        node "${{ github.action_path }}/bin/cli.js" render-comment "$SUMMARY" \
          --asset-urls "$URLS_PATH" \
          --run-url "$RUN_URL" \
          --marker "$MARKER" > "$BODY_PATH"
        echo "body-path=$BODY_PATH" >> "$GITHUB_OUTPUT"

    - name: Post or update sticky PR comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs')
          const body = fs.readFileSync(process.env.BODY_PATH, 'utf8')
          const marker = process.env.MARKER
          const issue_number = Number(process.env.PR_NUMBER)
          const { owner, repo } = context.repo
          if (!issue_number) {
            core.setFailed('microlink-difftool: pr-number input is required')
            return
          }
          try {
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
          } catch (err) {
            core.error('failed to post PR comment — ensure your workflow has `permissions: pull-requests: write`. See https://github.com/microlinkhq/difftool#permissions')
            throw err
          }
      env:
        BODY_PATH: ${{ steps.render.outputs.body-path }}
        MARKER: ${{ inputs.comment-marker }}
        PR_NUMBER: ${{ inputs.pr-number }}

    - name: Fail if any route exceeded threshold
      shell: bash
      run: |
        if [ "${{ steps.diff.outputs.diff-exit }}" -ne 0 ]; then
          echo "::error::microlink-difftool: at least one route exceeded the threshold"
          exit 1
        fi
