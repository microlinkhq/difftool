name: microlink-difftool
description: Visual diff between two URLs using Microlink full-page screenshots, posted as a sticky PR comment.
author: Microlink HQ
branding:
  icon: image
  color: purple

inputs:
  base:
    description: Production / baseline URL
    required: true
  head:
    description: Preview URL to compare against base. Use the literal value `vercel` to auto-discover from Vercel deployments on this PR's head SHA.
    required: true
  s3-config:
    description: |
      JSON object with S3-compatible storage credentials. Required keys:
      accessKeyId, secretAccessKey, bucket. Optional: endpoint (provider URL),
      region, forcePathStyle, presignedTtlSeconds. Pass via a secret.
    required: true
  pr-number:
    description: Pull request number to comment on. Defaults to the current pull_request event's number.
    required: false
  sha:
    description: Commit SHA used for the per-PR object key prefix. Defaults to the current pull_request event's head SHA.
    required: false
  routes:
    description: |
      Array of paths to diff.
      Supported formats:
      - JSON array string: "[\"/\",\"/kikobeats\"]"
      - YAML list string (with `|`): "- '/'\n- '/kikobeats'"
    default: '["/"]'
  threshold:
    description: Max acceptable diff ratio (0..1) before the action fails
    default: '0.001'
  pixel-threshold:
    description: Per-pixel sensitivity (0..1)
    default: '0.1'
  viewport-width:
    default: '1280'
  viewport-height:
    default: '800'
  microlink-api-key:
    description: Optional Microlink paid-tier key (recommended for CI)
    required: false
  presigned-ttl-seconds:
    description: TTL in seconds for pre-signed URLs in the comment. Overrides s3-config.presignedTtlSeconds. Defaults to 86400 (24h).
    required: false
  comment-marker:
    description: HTML comment marker so re-runs edit the same PR comment
    default: '<!-- microlink-difftool -->'
  provider-timeout:
    description: When head=vercel, max seconds to wait for the deployment to be ready.
    default: '600'
  provider-interval:
    description: When head=vercel, seconds between deployment-status polls.
    default: '10'
  token:
    description: Token for posting the PR comment. Alias for github-token.
    required: false
  github-token:
    description: Token for posting the PR comment.
    default: ${{ github.token }}

outputs:
  passed:
    description: '"true" if all routes are within threshold, else "false"'
    value: ${{ steps.diff.outputs.passed }}
  summary-json:
    description: Path to summary.json on the runner
    value: ${{ steps.diff.outputs.summary-json }}

runs:
  using: composite
  steps:
    - name: Resolve PR context
      id: pr
      shell: bash
      env:
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_SHA: ${{ inputs.sha }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_PR_SHA: ${{ github.event.pull_request.head.sha }}
        EVENT_ACTION: ${{ github.event.action }}
      run: |
        PR_NUMBER="${INPUT_PR_NUMBER:-$EVENT_PR_NUMBER}"
        PR_SHA="${INPUT_SHA:-$EVENT_PR_SHA}"

        if [ -z "$PR_NUMBER" ]; then
          echo "::error::microlink-difftool: pr-number is required (pass explicitly or run on a pull_request event)"
          exit 2
        fi

        echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "sha=$PR_SHA" >> "$GITHUB_OUTPUT"

        if [ "$EVENT_ACTION" = "closed" ]; then
          echo "mode=cleanup" >> "$GITHUB_OUTPUT"
        else
          echo "mode=diff" >> "$GITHUB_OUTPUT"
        fi

    - name: Stage S3 credentials
      id: s3
      shell: bash
      env:
        S3_CONFIG: ${{ inputs.s3-config }}
        CONFIG_PATH: ${{ runner.temp }}/microlink-difftool-s3.json
      run: |
        if [ -z "$S3_CONFIG" ]; then
          echo "::error::microlink-difftool: s3-config is required. See https://github.com/microlinkhq/difftool#s3-storage-setup"
          exit 2
        fi

        # Quick structural check before writing.
        echo "$S3_CONFIG" | node -e "
          let data='';
          process.stdin.on('data',c=>data+=c);
          process.stdin.on('end',()=>{
            try {
              const cfg = JSON.parse(data);
              const missing = ['accessKeyId','secretAccessKey','bucket'].filter(k => !cfg[k]);
              if (missing.length) {
                console.error('s3-config missing required field(s): ' + missing.join(', '));
                process.exit(2);
              }
            } catch (e) {
              console.error('s3-config is not valid JSON: ' + e.message);
              process.exit(2);
            }
          });
        "

        umask 077
        printf '%s' "$S3_CONFIG" > "$CONFIG_PATH"
        echo "config-path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install canvas native dependencies
      if: steps.pr.outputs.mode == 'diff'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

    - name: Install CLI dependencies
      shell: bash
      run: |
        corepack enable
        cd "${{ github.action_path }}"
        pnpm install --no-frozen-lockfile

    - name: Cleanup on PR close
      if: steps.pr.outputs.mode == 'cleanup'
      shell: bash
      env:
        CONFIG_PATH: ${{ steps.s3.outputs.config-path }}
        OWNER: ${{ github.repository_owner }}
        NAME: ${{ github.event.repository.name }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
      run: |
        node "${{ github.action_path }}/bin/cli.js" cleanup-s3 \
          --s3-config "$CONFIG_PATH" \
          --key-prefix "$OWNER/$NAME/pr-$PR_NUMBER"

    - name: Resolve head URL
      id: resolve-head
      if: steps.pr.outputs.mode == 'diff'
      uses: actions/github-script@v7
      env:
        HEAD_INPUT: ${{ inputs.head }}
        PR_SHA: ${{ steps.pr.outputs.sha }}
        MAX_SECONDS: ${{ inputs.provider-timeout }}
        INTERVAL_SECONDS: ${{ inputs.provider-interval }}
      with:
        github-token: ${{ inputs.token || inputs.github-token }}
        script: |
          const headInput = process.env.HEAD_INPUT
          if (headInput !== 'vercel') {
            core.info(`using explicit head URL: ${headInput}`)
            core.setOutput('url', headInput)
            return
          }

          const sha = process.env.PR_SHA
          if (!sha) {
            core.setFailed('head=vercel requires a SHA (pass `sha` input or run on a pull_request event)')
            return
          }

          const { owner, repo } = context.repo
          const intervalMs = Number(process.env.INTERVAL_SECONDS) * 1000
          const maxAttempts = Math.ceil(Number(process.env.MAX_SECONDS) / Number(process.env.INTERVAL_SECONDS))
          const previewFallbackGraceMs = Math.max(120000, intervalMs * 6)
          let firstUnmatchedPreviewAt = null
          const sleep = ms => new Promise(r => setTimeout(r, ms))
          const normalizeEnv = value =>
            String(value || '')
              .toLowerCase()
              .replace(/[\u2010-\u2015]/g, '-')
          const toTimestamp = value => {
            const parsed = Date.parse(String(value || ''))
            return Number.isNaN(parsed) ? 0 : parsed
          }

          core.info(`polling for vercel preview · sha=${sha} · up to ${maxAttempts} attempts · ${intervalMs / 1000}s interval`)

          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner, repo, sha, per_page: 100
            })
            const vercelDeployments = deployments
              .filter(d => d.creator && d.creator.login === 'vercel[bot]')
              .sort((a, b) => toTimestamp(b.created_at) - toTimestamp(a.created_at))
            const previewDeployments = vercelDeployments.filter(d =>
              normalizeEnv(d.environment).startsWith('preview')
            )
            const preferredPreviewDeployments = previewDeployments.filter(d =>
              normalizeEnv(d.environment).includes(repo.toLowerCase())
            )
            const genericPreviewDeployments = previewDeployments.filter(d =>
              normalizeEnv(d.environment) === 'preview'
            )

            const shouldHoldForPreferredPreview =
              preferredPreviewDeployments.length === 0 &&
              previewDeployments.length > 0 &&
              genericPreviewDeployments.length === 0

            if (shouldHoldForPreferredPreview) {
              firstUnmatchedPreviewAt = firstUnmatchedPreviewAt || Date.now()
              const unmatchedElapsedMs = Date.now() - firstUnmatchedPreviewAt
              const remainingGraceSeconds = Math.max(0, Math.ceil((previewFallbackGraceMs - unmatchedElapsedMs) / 1000))
              if (unmatchedElapsedMs >= previewFallbackGraceMs) {
                core.info(
                  `attempt ${attempt}/${maxAttempts}: using fallback preview deployment after waiting ${Math.ceil(unmatchedElapsedMs / 1000)}s for repo "${repo}" deployment`
                )
              } else {
                core.info(
                  `attempt ${attempt}/${maxAttempts}: found preview deployment(s) but none matched repo "${repo}" yet; waiting (${remainingGraceSeconds}s grace left)`
                )
                if (attempt === maxAttempts) break
                await sleep(intervalMs)
                continue
              }
            } else {
              firstUnmatchedPreviewAt = null
            }

            const vercel =
              preferredPreviewDeployments[0] ||
              genericPreviewDeployments[0] ||
              previewDeployments[0] ||
              vercelDeployments[0]

            if (!vercel) {
              core.info(`attempt ${attempt}/${maxAttempts}: no vercel deployment yet for ${sha}`)
              if (attempt === maxAttempts) break
              await sleep(intervalMs)
              continue
            }

            const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
              owner, repo, deployment_id: vercel.id, per_page: 100
            })
            const success = statuses.find(s => s.state === 'success')
            const failed = statuses.find(s => s.state === 'failure' || s.state === 'error')

            if (failed) {
              core.setFailed(`vercel deployment ${vercel.id} reported state=${failed.state}`)
              return
            }
            if (success && (success.environment_url || success.target_url)) {
              const resolvedUrl = success.environment_url || success.target_url
              core.info(`vercel preview ready: ${resolvedUrl}`)
              core.setOutput('url', resolvedUrl)
              return
            }

            const lastState = statuses[0] ? statuses[0].state : 'pending'
            core.info(`attempt ${attempt}/${maxAttempts}: deployment ${vercel.id} state=${lastState}`)
            if (attempt === maxAttempts) break
            await sleep(intervalMs)
          }

          core.setFailed(`timed out after ${maxAttempts} attempts waiting for vercel preview for ${sha}`)

    - name: Run microlink-difftool
      id: diff
      if: steps.pr.outputs.mode == 'diff'
      shell: bash
      env:
        MICROLINK_API_KEY: ${{ inputs.microlink-api-key }}
        OUT_DIR: ${{ runner.temp }}/microlink-difftool
        ROUTES_INPUT: ${{ inputs.routes }}
      run: |
        ROUTES_JSON="$(node -e "
          const raw = String(process.env.ROUTES_INPUT ?? '').trim()
          const fallback = ['/']
          if (!raw) {
            process.stdout.write(JSON.stringify(fallback))
            process.exit(0)
          }
          if (raw.startsWith('[')) {
            const parsed = JSON.parse(raw)
            if (!Array.isArray(parsed)) {
              throw new Error('routes must be an array')
            }
            process.stdout.write(JSON.stringify(parsed))
            process.exit(0)
          }
          const lines = raw.split('\\n').map(line => line.trim()).filter(Boolean)
          const isYamlList = lines.length > 0 && lines.every(line => line.startsWith('- '))
          if (!isYamlList) {
            throw new Error('routes must be an array (JSON array or YAML list)')
          }
          const routes = lines
            .map(line => line.slice(2).trim().replace(/^['\\\"]|['\\\"]$/g, ''))
            .filter(Boolean)
          process.stdout.write(JSON.stringify(routes.length > 0 ? routes : fallback))
        ")"

        set +e
        node "${{ github.action_path }}/bin/cli.js" \
          --base "${{ inputs.base }}" \
          --head "${{ steps.resolve-head.outputs.url }}" \
          --routes "$ROUTES_JSON" \
          --threshold "${{ inputs.threshold }}" \
          --pixel-threshold "${{ inputs.pixel-threshold }}" \
          --viewport-width "${{ inputs.viewport-width }}" \
          --viewport-height "${{ inputs.viewport-height }}" \
          --out "$OUT_DIR"
        DIFF_EXIT=$?
        set -e

        if [ "$DIFF_EXIT" -eq 2 ]; then
          echo "::error::microlink-difftool failed to run (exit 2)"
          exit 2
        fi

        if [ "$DIFF_EXIT" -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        echo "summary-json=$OUT_DIR/summary.json" >> "$GITHUB_OUTPUT"
        echo "diff-exit=$DIFF_EXIT" >> "$GITHUB_OUTPUT"

    - name: Upload screenshots to S3-compatible storage
      id: upload-assets
      if: steps.pr.outputs.mode == 'diff'
      shell: bash
      env:
        SUMMARY_PATH: ${{ steps.diff.outputs.summary-json }}
        OUT_DIR: ${{ runner.temp }}/microlink-difftool
        URLS_PATH: ${{ runner.temp }}/microlink-difftool-urls.json
        CONFIG_PATH: ${{ steps.s3.outputs.config-path }}
        OWNER: ${{ github.repository_owner }}
        NAME: ${{ github.event.repository.name }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        PR_SHA: ${{ steps.pr.outputs.sha }}
        TTL_INPUT: ${{ inputs.presigned-ttl-seconds }}
      run: |
        TTL_FLAG=""
        if [ -n "$TTL_INPUT" ]; then
          TTL_FLAG="--ttl-seconds $TTL_INPUT"
        fi
        node "${{ github.action_path }}/bin/cli.js" upload-s3 \
          --summary "$SUMMARY_PATH" \
          --out-dir "$OUT_DIR" \
          --s3-config "$CONFIG_PATH" \
          --key-prefix "$OWNER/$NAME/pr-$PR_NUMBER/$PR_SHA" \
          --urls-out "$URLS_PATH" \
          $TTL_FLAG
        echo "urls-path=$URLS_PATH" >> "$GITHUB_OUTPUT"

    - name: Render comment markdown
      id: render
      if: steps.pr.outputs.mode == 'diff'
      shell: bash
      env:
        SUMMARY: ${{ steps.diff.outputs.summary-json }}
        URLS_PATH: ${{ steps.upload-assets.outputs.urls-path }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        MARKER: ${{ inputs.comment-marker }}
        BODY_PATH: ${{ runner.temp }}/microlink-difftool-comment.md
      run: |
        node "${{ github.action_path }}/bin/cli.js" render-comment "$SUMMARY" \
          --asset-urls "$URLS_PATH" \
          --run-url "$RUN_URL" \
          --marker "$MARKER" > "$BODY_PATH"
        echo "body-path=$BODY_PATH" >> "$GITHUB_OUTPUT"

    - name: Post or update sticky PR comment
      if: steps.pr.outputs.mode == 'diff'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token || inputs.github-token }}
        script: |
          const fs = require('fs')
          const body = fs.readFileSync(process.env.BODY_PATH, 'utf8')
          const marker = process.env.MARKER
          const issue_number = Number(process.env.PR_NUMBER)
          const { owner, repo } = context.repo
          if (!issue_number) {
            core.setFailed('microlink-difftool: pr-number is required')
            return
          }
          try {
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
          } catch (err) {
            core.error('failed to post PR comment — ensure your workflow has `permissions: pull-requests: write`. See https://github.com/microlinkhq/difftool#permissions')
            throw err
          }
      env:
        BODY_PATH: ${{ steps.render.outputs.body-path }}
        MARKER: ${{ inputs.comment-marker }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}

    - name: Fail if any route exceeded threshold
      if: steps.pr.outputs.mode == 'diff'
      shell: bash
      run: |
        if [ "${{ steps.diff.outputs.diff-exit }}" -ne 0 ]; then
          echo "::error::microlink-difftool: at least one route exceeded the threshold"
          exit 1
        fi
