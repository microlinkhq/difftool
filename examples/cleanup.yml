# Save as .github/workflows/microlink-difftool-cleanup.yml in your repo.
# When a PR closes (merged or not), deletes the per-PR GitHub Release
# (and its tag) that microlink-difftool created to host screenshots.
name: Visual diff cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TAG_PREFIX: microlink-difftool-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `${process.env.TAG_PREFIX}-${process.env.PR_NUMBER}`
            const { owner, repo } = context.repo
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id })
              core.info(`deleted release ${tag} (id=${release.id})`)
            } catch (err) {
              if (err.status !== 404) throw err
              core.info(`no release ${tag} to delete`)
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` })
              core.info(`deleted tag ${tag}`)
            } catch (err) {
              if (err.status !== 404 && err.status !== 422) throw err
              core.info(`no tag ${tag} to delete`)
            }
