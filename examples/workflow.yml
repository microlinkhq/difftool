# Save as .github/workflows/visual-diff.yml in your repo.
# One workflow handles both PR-time diff runs and PR-close cleanup.
#
# Prereq: an S3-compatible bucket + token, with config stored in a
# repo secret named S3_CONFIG. See the README for templates.
name: Visual diff

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  pull-requests: write  # post / update sticky comment
  deployments: read     # poll Vercel deployment status when head=vercel

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: microlinkhq/difftool@master
        with:
          base: https://your-production-domain.com
          head: vercel
          routes: '/'
          microlink-api-key: ${{ secrets.MICROLINK_API_KEY }}
          s3-config: ${{ secrets.S3_CONFIG }}
